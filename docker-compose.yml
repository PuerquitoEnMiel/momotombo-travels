version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: momotombo_db
    restart: always
    environment:
      POSTGRES_USER: momotombo
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: momotombo_travels
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
